<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes</title>
    <script src="crypto.js"></script>
    <script src="sessionUtils.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="library">
    <!-- User Profile Box -->
    <div class="user-profile-box">
        <div class="user-info">
            <div class="user-avatar">
                <span id="userInitial">U</span>
            </div>
            <div class="user-details">
                <p class="user-name" id="userName">User</p>
                <p class="user-email" id="userEmail">email@example.com</p>
            </div>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
           
    <h2>Your notes</h2>
    <div class="library-actions">
        <button class="add-btn">+</button>
        <button class="public-feed-btn" type="button" id="sharedNotesBtn">Shared With Me</button>
        <button class="public-feed-btn" type="button" id="detectLeakBtn">Detect Leak</button>
    </div>

    <!-- Detect Leak panel -->
    <div id="detectLeakPanel" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:12px;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.18);z-index:1000;width:520px;max-width:95vw;">
        <h4 style="margin:0 0 12px">Detect Leak</h4>
        <p style="font-size:13px;color:#555;margin:0 0 12px">Paste suspected leaked text below. The app will check for an invisible fingerprint across all your notes and identify which recipient's copy it came from.</p>
        <textarea id="detectLeakInput" style="width:100%;height:140px;border-radius:8px;border:1px solid #ddd;padding:10px;font-size:13px;resize:vertical;box-sizing:border-box;" placeholder="Paste leaked text here..."></textarea>
        <div id="detectLeakResult" style="margin-top:10px;font-size:13px;min-height:24px;"></div>
        <div style="display:flex;gap:8px;margin-top:12px;">
            <button id="detectLeakRunBtn" class="btn btn-danger btn-sm" type="button">Check</button>
            <button id="detectLeakCloseBtn" class="btn btn-secondary btn-sm" type="button">Close</button>
        </div>
    </div>
    <div id="detectLeakBackdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:999;"></div>

    <!-- Container for dynamically loaded notes -->
    <div id="notesContainer"></div>

    <button class="public-feed-btn public-feed-floating" type="button" id="publicNotesBtn">Explore Public Notes</button>

    <script>
        // Defensive cleanup: if a stale Bootstrap backdrop exists, it can block all clicks.
        document.body.classList.remove('modal-open');
        document.body.style.overflow = 'auto';
        document.body.style.paddingRight = '0';
        document.body.style.pointerEvents = 'auto';
        document.querySelectorAll('.modal-backdrop').forEach((el) => el.remove());

        // Display user info from localStorage
        const user = JSON.parse(localStorage.getItem('user'));
        if (user) {
            document.getElementById('userName').textContent = user.firstName;
            document.getElementById('userEmail').textContent = user.email;
            // Set avatar initial
            const initial = user.firstName.charAt(0).toUpperCase();
            document.getElementById('userInitial').textContent = initial;
        }

        // Add note button
        const add = document.querySelector(".add-btn");
        add.addEventListener("click", () => {
            window.location.href = "newNote.html";
        });

        const publicFeedBtn = document.getElementById('publicNotesBtn');
        publicFeedBtn.addEventListener("click", () => {
            window.location.href = "publicNotes.html";
        });

        document.getElementById('sharedNotesBtn').addEventListener('click', () => {
            window.location.href = 'sharedNotes.html';
        });

        // Logout function
        function logout() {
            if (typeof clearStoredKey === 'function') {
                clearStoredKey();
            }
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            localStorage.removeItem('email');
            localStorage.removeItem('userEmail');
            window.location.href = 'login.html';
        }

        // Redirect to login if no token
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }

        // Self-heal stale sessions: ensure this account has a published protocol public key.
        (async () => {
            try {
                if (!user || !token) {
                    return;
                }
                const { ensureProtocolPublicKeyPublished } = await import('./userKeys.js');
                await ensureProtocolPublicKeyPublished({
                    token,
                    userKey: String(user.id || user.email || ''),
                    apiBase: 'http://localhost:8000'
                });
            } catch (error) {
                console.warn('Protocol key publish skipped:', error);
            }
        })();

        // Fetch and display notes
        async function loadNotes() {
            try {
                const response = await fetch('http://localhost:8000/notes/', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (checkAuth(response)) return;
                if (!response.ok) {
                    throw new Error('Failed to fetch notes');
                }

                const notes = await response.json();
                displayNotes(notes);
            } catch (error) {
                console.error('Error loading notes:', error);
                document.getElementById('notesContainer').innerHTML = 
                    '<p style="text-align: center; color: #666;">Error loading notes. Please try again.</p>';
            }
        }

        // Display notes in the UI
        function displayNotes(notes) {
            const container = document.getElementById('notesContainer');
            
            if (notes.length === 0) {
                container.innerHTML = 
                    '<p style="text-align: center; color: #666; margin-top: 40px;">No notes yet. Click the + button to create your first note!</p>';
                return;
            }

            container.innerHTML = notes.map(note => {
                // Extract plain text preview from HTML content
                let preview = '';
                if (!note.is_public && (note.uses_protocol || (typeof isEncryptedPayload === 'function' && isEncryptedPayload(note.content || '')))) {
                    preview = '';
                } else {
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = note.content || '';
                    const textContent = tempDiv.textContent || tempDiv.innerText || '';
                    preview = textContent.substring(0, 150) + (textContent.length > 150 ? '...' : '');
                }

                // Format date
                const date = new Date(note.created_at);
                const formattedDate = date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });

                return `
                    <div class="notes-container">
                        <div class="note-card clickable-card" data-note-id="${note.id}">
                            <img src="https://picsum.photos/seed/${note.id}/200/200" alt="Note preview">
                            <span class="badge ${note.is_public ? 'public' : 'private'}">
                                ${note.is_public ? 'Public' : 'Private'}
                            </span>
                            <button class="delete-note-btn" data-note-id="${note.id}" type="button">Delete</button>
                            
                            <div class="note-content">
                                <h4>${note.title}</h4>
                                <p>${preview}</p>
                                <small style="color: #888; font-size: 0.85rem;">${formattedDate}</small>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Open note in readable mode when card is clicked
            document.querySelectorAll('.clickable-card').forEach((card) => {
                card.addEventListener('click', () => {
                    const noteId = card.getAttribute('data-note-id');
                    window.location.href = `noteView.html?id=${noteId}`;
                });
            });

            // Delete note button should not trigger card click.
            document.querySelectorAll('.delete-note-btn').forEach((button) => {
                button.addEventListener('click', async (event) => {
                    event.stopPropagation();
                    const noteId = button.getAttribute('data-note-id');

                    const confirmed = window.confirm('Delete this note? This cannot be undone.');
                    if (!confirmed) {
                        return;
                    }

                    try {
                        const response = await fetch(`http://localhost:8000/notes/${noteId}`, {
                            method: 'DELETE',
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });

                        if (!response.ok) {
                            let detail = 'Failed to delete note';
                            try {
                                const errorData = await response.json();
                                detail = errorData.detail || detail;
                            } catch (_ignored) {
                                // Keep default error detail if response has no JSON body.
                            }
                            throw new Error(detail);
                        }

                        // Refresh list after successful deletion.
                        await loadNotes();
                    } catch (error) {
                        console.error('Delete note error:', error);
                        alert('Could not delete note: ' + error.message);
                    }
                });
            });
        }

        // Load notes when page loads
        loadNotes();

        // ── Detect Leak ────────────────────────────────────────────────────────
        const FP_MARKER = '\u200B\u200B';

        function extractFingerprint(text) {
            const start = text.indexOf(FP_MARKER);
            if (start === -1) return null;
            const end = text.indexOf(FP_MARKER, start + FP_MARKER.length);
            if (end === -1) return null;
            const bits = Array.from(text.slice(start + FP_MARKER.length, end))
                .map(c => c === '\u200D' ? '1' : c === '\u200C' ? '0' : null)
                .filter(b => b !== null)
                .join('');
            if (bits.length < 8) return null;
            const byteArr = [];
            for (let i = 0; i + 8 <= bits.length; i += 8) {
                byteArr.push(parseInt(bits.slice(i, i + 8), 2));
            }
            return btoa(String.fromCharCode(...byteArr));
        }

        const detectLeakBtn = document.getElementById('detectLeakBtn');
        const detectLeakPanel = document.getElementById('detectLeakPanel');
        const detectLeakBackdrop = document.getElementById('detectLeakBackdrop');
        const detectLeakInput = document.getElementById('detectLeakInput');
        const detectLeakResult = document.getElementById('detectLeakResult');

        function openDetectLeakPanel() {
            detectLeakInput.value = '';
            detectLeakResult.innerHTML = '';
            detectLeakPanel.style.display = 'block';
            detectLeakBackdrop.style.display = 'block';
            detectLeakInput.focus();
        }

        function closeDetectLeakPanel() {
            detectLeakPanel.style.display = 'none';
            detectLeakBackdrop.style.display = 'none';
        }

        detectLeakBtn.addEventListener('click', openDetectLeakPanel);
        document.getElementById('detectLeakCloseBtn').addEventListener('click', closeDetectLeakPanel);
        detectLeakBackdrop.addEventListener('click', closeDetectLeakPanel);

        document.getElementById('detectLeakRunBtn').addEventListener('click', async () => {
            const text = detectLeakInput.value;
            const fingerprint = extractFingerprint(text);
            if (!fingerprint) {
                detectLeakResult.innerHTML = '<span style="color:#c00">No fingerprint found in this text.</span>';
                return;
            }
            detectLeakResult.textContent = 'Checking...';
            try {
                const res = await fetch('http://localhost:8000/notes/detect-fingerprint', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ fingerprint_b64: fingerprint }),
                });
                if (checkAuth(res)) { closeDetectLeakPanel(); return; }
                const data = await res.json();
                if (data.found) {
                    detectLeakResult.innerHTML = `<span style="color:#c00"><strong>Leak detected!</strong><br>Note: <em>${data.note_title}</em><br>Leaked by: <strong>${data.firstName} ${data.lastName}</strong> (${data.email})</span>`;
                } else {
                    detectLeakResult.innerHTML = '<span style="color:#555">No matching fingerprint found across your notes.</span>';
                }
            } catch (_e) {
                detectLeakResult.innerHTML = '<span style="color:#c00">Detection failed. Please try again.</span>';
            }
        });
    </script>

</body>
</html>
