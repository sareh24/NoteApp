<!DOCTYPE html>
<html lang="en">
<head>
                                    <meta charset="UTF-8">
                                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                                    <title>Document</title>
                                    <script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>
                                    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
2. Update your import handler:
                                    <link rel="stylesheet" href="styles.css">

</head>
<body class="newnote">
                                    <div class="editor-wrapper">

                                                                        <!-- SHARE BUTTON -->
                                                                        <button class="share-btn">Share</button>
                                                                    
                                                                        <!-- SHARE MENU -->
                                                                        <div class="share-menu" id="shareMenu">
                                                                          <h4>Share with someone</h4>
                                                                          <input type="text" placeholder="Search username..." class="share-search">
                                                                    
                                                                          <div class="search-results">
                                                                            <div class="user-result">JohnDoe</div>
                                                                            <div class="user-result">Sarah21</div>
                                                                          </div>
                                                                    
                                                                          <button class="send-share">Send your Note</button>
                                                                        </div>
                                                                    
                                                                        <!-- VISIBILITY TOGGLE -->
                                                                        <div class="visibility-toggle">
                                                                          <button type="button" class="toggle-btn active" data-value="public">
                                                                            Public
                                                                          </button>
                                                                          <button type="button" class="toggle-btn" data-value="private">
                                                                            Private
                                                                          </button>
                                                                        </div>
                                                                    
                                                                        <!-- TITLE -->
                                                                        <h2>Write your note</h2>
                                                                    
                                                                        <!-- EDITOR -->
                                                                        <textarea id="editor"></textarea>
                                                                    
                                                                        <!-- BOTTOM BUTTONS -->
                                                                        <div class="bottom-actions">
                                                                          <button class="save-btn">Save</button>
                                                                          <button class="import-btn">Import</button>  <!-- add this -->
                                                                         <input type="file" id="importFile" accept=".txt,.html,.md,.docx" style="display:none">
                                                                          <button class="exit-btn">Exit</button>
                                                                        </div>
                                                                    
                                                                      </div>
    
   
    </div>
   

   <script>
    async function encryptNote(content) {
    // TODO: replace with real AES-256-GCM encryption
    return {
        ciphertext: content,      // plaintext for now
        encryptedDek: null,
        keyVersion: "v1"
    };
}
      // Store editor instance globally
      let editorInstance;
      
      ClassicEditor
      .create(document.querySelector('#editor'))
      .then(editor => {
        editorInstance = editor;
      })
      .catch(error => {
        console.error(error);
      });
      
      const shareBtn = document.querySelector(".share-btn");
      const shareMenu = document.getElementById("shareMenu");

      shareBtn.addEventListener("click", () => {
          shareMenu.style.display =
              shareMenu.style.display === "block" ? "none" : "block";
      });
      
      const buttons = document.querySelectorAll(".toggle-btn");

      buttons.forEach(btn => {
        btn.addEventListener("click", () => {
          buttons.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
        });
      });
      const importBtn = document.querySelector(".import-btn");
const importFile = document.getElementById("importFile");

importBtn.addEventListener("click", () => {
    importFile.click();  // open file picker
});

importFile.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;

    // handle .docx differently
    if (file.name.endsWith('.docx')) {
        const reader = new FileReader();
        reader.onload = async (event) => {
            const arrayBuffer = event.target.result;
            const result = await mammoth.convertToHtml({ arrayBuffer });
            if (editorInstance) {
                editorInstance.setData(result.value);
            }
        };
        reader.readAsArrayBuffer(file);  // binary read, not text
    } else {
        // .txt and .html stay as before
        const reader = new FileReader();
        reader.onload = (event) => {
            if (editorInstance) {
                editorInstance.setData(event.target.result);
            }
        };
        reader.readAsText(file);
    }
});
      const exitbtn = document.querySelector(".exit-btn")
      exitbtn.addEventListener("click", () => {
         window.location.href = "library.html"
      });
      
      const savebtn = document.querySelector(".save-btn")
      savebtn.addEventListener("click", async () => {
          // Check if user is logged in
          const token = localStorage.getItem('token');
          if (!token) {
              alert('Please login first');
              window.location.href = 'login.html';
              return;
          }

          // Get editor content
          if (!editorInstance) {
              alert('Editor not ready yet');
              return;
          }
          
          const content = editorInstance.getData();
          if (!content || content.trim() === '') {
              alert('Please write something before saving');
              return;
          }

          // Get visibility setting
          const activeBtn = document.querySelector('.toggle-btn.active');
          const isPublic = activeBtn.getAttribute('data-value') === 'public';

          // Extract title from content (first line or "Untitled Note")
          const tempDiv = document.createElement('div');
          tempDiv.innerHTML = content;
          const firstText = tempDiv.textContent.trim();
          const title = firstText.substring(0, 50) || "Untitled Note";
                    let finalContent = content;
          let encryptedDek = null;
          let keyVersion = null;

          if (!isPublic) {
              const encrypted = await encryptNote(content);  // stub for now
              finalContent = encrypted.ciphertext;
              encryptedDek = encrypted.encryptedDek;
              keyVersion = encrypted.keyVersion;
          }
      

          try {
              const response = await fetch('http://localhost:8000/notes/', {
                  method: 'POST',
                  headers: {
                      'Content-Type': 'application/json',
                      'Authorization': `Bearer ${token}`
                  },
                  body: JSON.stringify({
                      title: title,
                      content: finalContent,       // encrypted if private
                      is_public: isPublic,
                      encrypted_dek: encryptedDek, // null if public
                      key_version: keyVersion       // null if public
                  })
              });

              if (!response.ok) {
                  const error = await response.json();
                  throw new Error(error.detail || 'Failed to save note');
              }

              const data = await response.json();
              console.log('Note saved:', data);
              alert('Note saved successfully!');
              window.location.href = 'library.html';
          } catch (error) {
              console.error('Save error:', error);
              alert('Error saving note: ' + error.message);
          }
      });
   </script>
                                
</body>
</html>
