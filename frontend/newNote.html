<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Note</title>
    <script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl-fast.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tweetnacl-util@0.15.1/nacl-util.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="newnote">
    <div class="editor-wrapper">
        <button class="share-btn">Share</button>

        <div class="share-menu" id="shareMenu">
            <h4>Share with someone</h4>
            <input type="text" placeholder="Search username..." class="share-search">
            <div class="search-results">
                <div class="user-result">JohnDoe</div>
                <div class="user-result">Sarah21</div>
            </div>
            <button class="send-share">Send your Note</button>
        </div>

        <div class="visibility-toggle">
            <button type="button" class="toggle-btn active" data-value="public">Public</button>
            <button type="button" class="toggle-btn" data-value="private">Private</button>
        </div>

        <h2>Write your note</h2>
        <input type="text" id="noteTitle" placeholder="Note title..." style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px;">
        <textarea id="editor"></textarea>

        <div class="bottom-actions">
            <button class="save-btn">Save</button>
            <button class="exit-btn">Exit</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        // Initialize CKEditor
        let editor;
        ClassicEditor.create(document.querySelector('#editor'))
            .then(newEditor => {
                editor = newEditor;
            })
            .catch(error => {
                console.error('CKEditor error:', error);
            });

        // Encryption functions using stored master key
        function getMasterKey() {
            // Retrieve base64 master key from sessionStorage
            const masterKeyB64 = sessionStorage.getItem('masterKey');
            if (!masterKeyB64) {
                throw new Error('Master key not found. Please log in again.');
            }
            // Decode from base64 to Uint8Array
            const binaryString = atob(masterKeyB64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes;
        }

        async function encryptNote(plaintext) {
            try {
                const key = getMasterKey();  // Use stored master key directly
                const nonce = nacl.randomBytes(24);
                const plaintextBytes = new TextEncoder().encode(plaintext);
                const ciphertext = nacl.secretbox(plaintextBytes, nonce, key);

                // Combine nonce + ciphertext and encode as base64
                const combined = new Uint8Array(nonce.length + ciphertext.length);
                combined.set(nonce);
                combined.set(ciphertext, nonce.length);

                return nacl.util.encodeBase64(combined);
            } catch (error) {
                console.error('Encryption error:', error);
                throw new Error('Failed to encrypt note: ' + error.message);
            }
        }

        async function decryptNote(ciphertext) {
            try {
                const combined = nacl.util.decodeBase64(ciphertext);
                const nonce = combined.slice(0, 24);
                const encryptedData = combined.slice(24);

                const key = getMasterKey();  // Use stored master key directly
                const plaintext = nacl.secretbox.open(encryptedData, nonce, key);

                if (!plaintext) {
                    throw new Error('Decryption failed - corrupted data');
                }

                return new TextDecoder().decode(plaintext);
            } catch (error) {
                console.error('Decryption error:', error);
                throw new Error('Failed to decrypt note: ' + error.message);
            }
        }

        // Share button toggle
        const shareBtn = document.querySelector(".share-btn");
        const shareMenu = document.getElementById("shareMenu");

        shareBtn.addEventListener("click", () => {
            shareMenu.style.display = shareMenu.style.display === "block" ? "none" : "block";
        });

        // Visibility toggle
        const buttons = document.querySelectorAll(".toggle-btn");
        buttons.forEach(btn => {
            btn.addEventListener("click", () => {
                buttons.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
            });
        });

        // Get visibility status
        function getIsPublic() {
            const activeBtn = document.querySelector(".toggle-btn.active");
            return activeBtn.dataset.value === "public";
        }

        // Save note - NO PASSWORD PROMPT!
        document.querySelector(".save-btn").addEventListener("click", async () => {
            const title = document.querySelector("#noteTitle").value.trim();
            const content = editor.getData();
            const userId = localStorage.getItem('userId');

            if (!title || !content) {
                alert('Please enter a title and content');
                return;
            }

            if (!userId) {
                alert('User not logged in');
                window.location.href = 'login.html';
                return;
            }

            try {
                // Encrypt the content using stored master key (NO PASSWORD PROMPT)
                const encryptedContent = await encryptNote(content);

                // Send to backend
                const response = await fetch(`${API_URL}/notes/create`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'user-id': userId
                    },
                    body: JSON.stringify({
                        title: title,
                        content_ciphertext: encryptedContent,
                        is_public: getIsPublic()
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    console.log('Note saved:', data);
                    alert('Note saved successfully!');
                    window.location.href = 'library.html';
                } else {
                    const error = await response.json();
                    alert(`Error saving note: ${error.detail || 'Unknown error'}`);
                }
            } catch (error) {
                console.error('Save error:', error);
                alert(`Failed to save note: ${error.message}`);
            }
        });

        // Exit button
        document.querySelector(".exit-btn").addEventListener("click", () => {
            window.location.href = 'library.html';
        });

        // Load note if editing existing note (check URL params)
        const urlParams = new URLSearchParams(window.location.search);
        const noteId = urlParams.get('id');

        if (noteId) {
            const userId = localStorage.getItem('userId');
            const loadExistingNote = async () => {
                try {
                    const response = await fetch(`${API_URL}/notes/${noteId}`, {
                        headers: {
                            'user-id': userId
                        }
                    });

                    if (response.ok) {
                        const note = await response.json();
                        document.querySelector("#noteTitle").value = note.title;

                        // Decrypt using stored master key (NO PASSWORD PROMPT)
                        const decryptedContent = await decryptNote(note.content_ciphertext);
                        editor.setData(decryptedContent);

                        // Set visibility
                        const visibilityBtns = document.querySelectorAll(".toggle-btn");
                        visibilityBtns.forEach(btn => {
                            btn.classList.remove("active");
                            if ((note.is_public && btn.dataset.value === "public") ||
                                (!note.is_public && btn.dataset.value === "private")) {
                                btn.classList.add("active");
                            }
                        });
                    }
                } catch (error) {
                    console.error('Error loading note:', error);
                    alert('Failed to load note: ' + error.message);
                }
            };

            // Wait for editor to initialize
            setTimeout(loadExistingNote, 1000);
        }
    </script>
</body>
</html>
