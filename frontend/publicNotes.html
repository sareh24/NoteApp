<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Notes</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="library">
    <div class="user-profile-box">
        <div class="user-info">
            <div class="user-avatar">
                <span id="userInitial">U</span>
            </div>
            <div class="user-details">
                <p class="user-name" id="userName">User</p>
                <p class="user-email" id="userEmail">email@example.com</p>
            </div>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <h2>Public Notes</h2>
    <div class="library-actions">
        <button class="exit-btn" type="button" id="backToLibraryBtn">Back to My Notes</button>
    </div>

    <div id="publicNotesContainer"></div>

    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user'));

        if (!token) {
            window.location.href = 'login.html';
        }

        if (user) {
            document.getElementById('userName').textContent = user.firstName;
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('userInitial').textContent = user.firstName.charAt(0).toUpperCase();
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            localStorage.removeItem('email');
            window.location.href = 'login.html';
        }

        document.getElementById('backToLibraryBtn').addEventListener('click', () => {
            window.location.href = 'library.html';
        });

        async function loadPublicNotes() {
            try {
                const response = await fetch('http://localhost:8000/notes/public', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to fetch public notes');
                }

                const notes = await response.json();
                renderPublicNotes(notes);
            } catch (error) {
                console.error('Error loading public notes:', error);
                document.getElementById('publicNotesContainer').innerHTML =
                    '<p style="text-align: center; color: #666; margin-top: 40px;">Could not load public notes.</p>';
            }
        }

        function renderPublicNotes(notes) {
            const container = document.getElementById('publicNotesContainer');

            if (!Array.isArray(notes) || notes.length === 0) {
                container.innerHTML =
                    '<p style="text-align: center; color: #666; margin-top: 40px;">No public notes available yet.</p>';
                return;
            }

            container.innerHTML = notes.map((note) => {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = note.content;
                const textContent = tempDiv.textContent || tempDiv.innerText || '';
                const preview = textContent.substring(0, 150) + (textContent.length > 150 ? '...' : '');
                const date = new Date(note.created_at);
                const formattedDate = date.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });

                return `
                    <div class="notes-container">
                        <div class="note-card clickable-card" data-note-id="${note.id}">
                            <img src="https://picsum.photos/seed/${note.id}/200/200" alt="Note preview">
                            <span class="badge public">Public</span>
                            <div class="note-content">
                                <h4>${note.title || 'Untitled Note'}</h4>
                                <p>${preview}</p>
                                <small style="color: #888; font-size: 0.85rem;">${formattedDate}</small>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.clickable-card').forEach((card) => {
                card.addEventListener('click', () => {
                    const noteId = card.getAttribute('data-note-id');
                    window.location.href = `noteView.html?id=${noteId}`;
                });
            });
        }

        loadPublicNotes();
    </script>
</body>
</html>
