<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Note</title>
    <script src="crypto.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="newnote">
    <div class="editor-wrapper note-view-wrapper">
        <div class="note-view-topbar">
            <button id="backBtn" class="exit-btn" type="button">Back</button>
            <div class="note-view-actions">
                <button id="shareBtn" class="save-btn" type="button">Share</button>
                <button id="editBtn" class="save-btn" type="button">Edit</button>
            </div>
        </div>

        <div class="share-menu" id="shareMenu">
            <h4>Share with someone</h4>
            <input type="text" id="shareSearch" placeholder="Search by name or email..." class="share-search" autocomplete="off">
            <div id="searchResults" class="search-results"></div>
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-top:8px;">
                <input type="checkbox" id="allowEditShare"> Allow this user to edit
            </label>
            <button class="send-share" type="button" id="sendShareBtn">Send your Note</button>
        </div>

        <h2 id="noteTitle">Loading...</h2>
        <p id="noteMeta" class="note-view-meta"></p>

        <div id="noteContent" class="note-view-content"></div>
    </div>

    <button id="sharedWithBtn" class="shared-with-btn" type="button">Shared with</button>

    <div id="sharedWithPanel" class="shared-with-panel" style="display:none;">
        <div class="shared-with-header">
            <h4>Shared with</h4>
            <button id="closeSharedPanelBtn" class="shared-with-close" type="button">Close</button>
        </div>
        <div id="sharedWithList" class="shared-with-list"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        const token = localStorage.getItem('token');
        const currentUser = JSON.parse(localStorage.getItem('user') || 'null');
        const protocolModulesPromise = Promise.all([
            import('./userKeys.js'),
            import('./updatableNotesCrypto.js')
        ]);
        const params = new URLSearchParams(window.location.search);
        const noteId = params.get('id');
        const shareBtn = document.getElementById('shareBtn');
        const shareMenu = document.getElementById('shareMenu');
        const shareSearchInput = document.getElementById('shareSearch');
        const searchResultsDiv = document.getElementById('searchResults');
        const allowEditShareCheckbox = document.getElementById('allowEditShare');
        const sendShareBtn = document.getElementById('sendShareBtn');
        const sharedWithBtn = document.getElementById('sharedWithBtn');
        const sharedWithPanel = document.getElementById('sharedWithPanel');
        const closeSharedPanelBtn = document.getElementById('closeSharedPanelBtn');
        const sharedWithList = document.getElementById('sharedWithList');

        let loadedNoteRecord = null;
        let selectedUser = null;
        let searchTimeout = null;
        let sharedRecipientCache = [];

        if (!token) {
            window.location.href = 'login.html';
        }

        if (!noteId) {
            window.location.href = 'library.html';
        }

        function getProtocolUserKey() {
            const ownerEmail = localStorage.getItem('userEmail') || (currentUser && currentUser.email) || '';
            return String((currentUser && currentUser.id) || ownerEmail || '');
        }

        async function ensureProtocolReady() {
            const [userKeysModule, protocolCryptoModule] = await protocolModulesPromise;
            const keys = await userKeysModule.ensureProtocolPublicKeyPublished({
                token,
                userKey: getProtocolUserKey(),
                apiBase: API_BASE
            });
            return { ...keys, protocolCryptoModule };
        }

        async function fetchUserPublicKey(userId) {
            const response = await fetch(`${API_BASE}/auth/users/${userId}/public-key`, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (!response.ok) {
                const error = await response.json().catch(() => ({}));
                throw new Error(error.detail || 'Recipient has not published a public key yet');
            }

            const payload = await response.json();
            return payload.public_key;
        }

        async function fetchNoteRecord() {
            const response = await fetch(`${API_BASE}/notes/${noteId}`, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (!response.ok) {
                const error = await response.json().catch(() => ({}));
                throw new Error(error.detail || 'Could not load note');
            }

            loadedNoteRecord = await response.json();
            return loadedNoteRecord;
        }

        document.getElementById('backBtn').addEventListener('click', () => {
            window.location.href = 'library.html';
        });

        document.getElementById('editBtn').addEventListener('click', () => {
            window.location.href = `newNote.html?edit=${noteId}`;
        });

        shareBtn.addEventListener('click', () => {
            const isOpen = shareMenu.style.display === 'block';
            shareMenu.style.display = isOpen ? 'none' : 'block';
            if (!isOpen) {
                shareSearchInput.focus();
            }
        });

        sharedWithBtn.addEventListener('click', async () => {
            const isOpen = sharedWithPanel.style.display === 'block';
            sharedWithPanel.style.display = isOpen ? 'none' : 'block';
            if (!isOpen) {
                await loadSharedWithList();
            }
        });

        closeSharedPanelBtn.addEventListener('click', () => {
            sharedWithPanel.style.display = 'none';
        });

        shareSearchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            selectedUser = null;
            const query = shareSearchInput.value.trim();
            if (query.length < 2) {
                searchResultsDiv.innerHTML = '';
                return;
            }
            searchTimeout = setTimeout(() => searchUsers(query), 300);
        });

        async function searchUsers(query) {
            try {
                const response = await fetch(
                    `${API_BASE}/auth/users/search?q=${encodeURIComponent(query)}`,
                    { headers: { 'Authorization': `Bearer ${token}` } }
                );
                if (!response.ok) {
                    throw new Error('Search failed');
                }
                const users = await response.json();
                renderUserResults(users);
            } catch (_error) {
                searchResultsDiv.innerHTML = '<p style="color:red;font-size:13px">Search failed. Try again.</p>';
            }
        }

        function renderUserResults(users) {
            searchResultsDiv.innerHTML = '';
            if (users.length === 0) {
                searchResultsDiv.innerHTML = '<p style="font-size:13px;color:#888;padding:4px 0">No users found</p>';
                return;
            }

            users.forEach((user) => {
                const div = document.createElement('div');
                div.className = 'user-result';
                div.textContent = user.has_public_key
                    ? `${user.firstName} ${user.lastName}`
                    : `${user.firstName} ${user.lastName} (no public key yet)`;
                div.title = user.email;

                if (!user.has_public_key) {
                    div.style.opacity = '0.55';
                    div.style.cursor = 'not-allowed';
                }

                div.addEventListener('click', () => {
                    if (!user.has_public_key) {
                        return;
                    }
                    document.querySelectorAll('#searchResults .user-result').forEach((el) =>
                        el.classList.remove('selected')
                    );
                    div.classList.add('selected');
                    selectedUser = { id: user.id, name: `${user.firstName} ${user.lastName}` };
                });

                searchResultsDiv.appendChild(div);
            });
        }

        sendShareBtn.addEventListener('click', async () => {
            // Capture immediately — selectedUser can be reset to null by the search input
            // listener during async operations below, causing "Cannot read properties of null"
            const targetUser = selectedUser;
            if (!targetUser) {
                alert('Please select a user from the search results.');
                return;
            }

            try {
                const note = loadedNoteRecord || await fetchNoteRecord();
                if (note.is_public) {
                    throw new Error('Public notes do not need sharing.');
                }
                if (!note.uses_protocol) {
                    throw new Error('Only protocol-managed private notes can be shared.');
                }

                const { protocolCryptoModule, publicKeyB64, privateKeyB64 } = await ensureProtocolReady();
                const recipientPublicKey = await fetchUserPublicKey(targetUser.id);
                const sharePacket = await protocolCryptoModule.createSharePacket({
                    recipientUserId: targetUser.id,
                    recipientPublicKeyB64: recipientPublicKey,
                    gkVersion: note.current_gk_version,
                    myPublicKeyB64: publicKeyB64,
                    myPrivateKeyB64: privateKeyB64,
                    myEncGkB64: note.my_enc_gk_b64,
                });

                const response = await fetch(`${API_BASE}/notes/${noteId}/share`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        recipient_id: targetUser.id,
                        can_edit: allowEditShareCheckbox.checked,
                        gk_version: sharePacket.gk_version,
                        enc_gk_b64: sharePacket.enc_gk_b64
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Share failed');
                }

                alert(`Note shared with ${targetUser.name}!`);
                shareMenu.style.display = 'none';
                shareSearchInput.value = '';
                searchResultsDiv.innerHTML = '';
                selectedUser = null;
                allowEditShareCheckbox.checked = false;
                if (sharedWithPanel.style.display === 'block') {
                    await loadSharedWithList();
                }
            } catch (error) {
                alert('Could not share note: ' + error.message);
            }
        });

        async function loadSharedWithList() {
            sharedWithList.innerHTML = '<p class="shared-with-empty">Loading...</p>';
            try {
                const response = await fetch(`${API_BASE}/notes/${noteId}/shares`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Could not load sharing list');
                }

                const recipients = await response.json();
                sharedRecipientCache = Array.isArray(recipients) ? recipients : [];
                if (sharedRecipientCache.length === 0) {
                    sharedWithList.innerHTML = '<p class="shared-with-empty">This note is not shared with anyone yet.</p>';
                    return;
                }

                sharedWithList.innerHTML = '';
                sharedRecipientCache.forEach((recipient) => {
                    const row = document.createElement('div');
                    row.className = 'shared-with-item';
                    const mode = recipient.can_edit ? 'Can edit' : 'Read only';
                    row.innerHTML = `
                        <div>
                            <div class="shared-with-name">${recipient.firstName} ${recipient.lastName}</div>
                            <div class="shared-with-email">${recipient.email}</div>
                        </div>
                        <div class="shared-with-actions">
                            <span class="shared-with-pill">${mode}</span>
                            <button type="button" class="shared-with-unshare-btn" data-recipient-id="${recipient.recipient_id}">Unshare</button>
                        </div>
                    `;
                    sharedWithList.appendChild(row);
                });

                sharedWithList.querySelectorAll('.shared-with-unshare-btn').forEach((button) => {
                    button.addEventListener('click', async () => {
                        const recipientId = button.getAttribute('data-recipient-id');
                        if (!recipientId) {
                            return;
                        }

                        const ok = window.confirm('Remove this user from shared access and rotate the group key?');
                        if (!ok) {
                            return;
                        }

                        try {
                            const note = loadedNoteRecord || await fetchNoteRecord();
                            const remainingRecipients = sharedRecipientCache.filter(
                                (recipient) => String(recipient.recipient_id) !== String(recipientId)
                            );
                            const { protocolCryptoModule, publicKeyB64, privateKeyB64 } = await ensureProtocolReady();
                            const recipientPublicKeysByUserId = {
                                [String(currentUser.id)]: publicKeyB64,
                            };

                            for (const recipient of remainingRecipients) {
                                recipientPublicKeysByUserId[String(recipient.recipient_id)] = await fetchUserPublicKey(recipient.recipient_id);
                            }

                            const rotation = await protocolCryptoModule.createGroupKeyRotation({
                                newGkVersion: note.current_gk_version + 1,
                                recipientPublicKeysByUserId,
                                myPublicKeyB64: publicKeyB64,
                                myPrivateKeyB64: privateKeyB64,
                                myEncGkB64: note.my_enc_gk_b64,
                            });

                            const response = await fetch(`${API_BASE}/notes/${noteId}/rotate-group-key`, {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Authorization': `Bearer ${token}`
                                },
                                body: JSON.stringify({
                                    new_gk_version: rotation.new_gk_version,
                                    update_token_b64: rotation.update_token_b64,
                                    revoked_recipient_id: recipientId,
                                    key_packets: rotation.key_packets
                                })
                            });

                            if (!response.ok) {
                                const err = await response.json().catch(() => ({}));
                                throw new Error(err.detail || 'Could not rotate the group key');
                            }

                            await fetchNoteRecord();
                            await loadSharedWithList();
                        } catch (error) {
                            alert(error.message || 'Could not revoke access');
                        }
                    });
                });
            } catch (_error) {
                sharedWithList.innerHTML = '<p class="shared-with-error">Could not load sharing list.</p>';
            }
        }

        if (currentUser && currentUser.is_admin) {
            document.getElementById('editBtn').style.display = 'none';
        }

        async function ensurePrivateKeyReady(ownerEmail) {
            if (!ownerEmail) {
                throw new Error('Could not decrypt private note. Please log in again.');
            }

            if (typeof loadStoredKeyForUser === 'function') {
                const existing = await loadStoredKeyForUser(ownerEmail);
                if (existing) {
                    return;
                }
            }

            const password = window.prompt('Enter your password to unlock private notes for this session:');
            if (!password) {
                throw new Error('Could not decrypt private note. Please log in again.');
            }

            if (typeof deriveAndStoreKeyFromCredentials !== 'function') {
                throw new Error('Crypto module is unavailable.');
            }

            await deriveAndStoreKeyFromCredentials(password, ownerEmail);

            const restored = await loadStoredKeyForUser(ownerEmail);
            if (!restored) {
                throw new Error('Could not decrypt private note. Please log in again.');
            }
        }

        async function loadNote() {
            try {
                const note = await fetchNoteRecord();
                const createdAt = new Date(note.created_at).toLocaleString();
                const visibility = note.is_public ? 'Public' : 'Private';
                const isOwner = currentUser && String(currentUser.id) === String(note.user_id);
                let noteContent = note.content || '<p>No content</p>';

                if (note.uses_protocol && !note.is_public) {
                    const { protocolCryptoModule, publicKeyB64, privateKeyB64 } = await ensureProtocolReady();
                    noteContent = await protocolCryptoModule.decryptProtocolNote({
                        noteId: String(note.id),
                        latestVersion: note.latest_version,
                        myPublicKeyB64: publicKeyB64,
                        myPrivateKeyB64: privateKeyB64,
                        myEncGkB64: note.my_enc_gk_b64,
                    });
                } else if (!note.is_public) {
                    if (isOwner) {
                        const ownerEmail = localStorage.getItem('userEmail') || (currentUser && currentUser.email) || '';
                        await ensurePrivateKeyReady(ownerEmail);
                        noteContent = await decryptPrivateNoteFromRecord(note, ownerEmail);
                    } else {
                        noteContent = '<p><em>This private note is shared with you, but recipient key unwrap is not implemented yet.</em></p>';
                    }
                }

                const canEdit = isOwner || Boolean(note.can_edit);

                if (!canEdit || (currentUser && currentUser.is_admin)) {
                    document.getElementById('editBtn').style.display = 'none';
                }

                if (!isOwner || (currentUser && currentUser.is_admin) || note.is_public) {
                    shareBtn.style.display = 'none';
                    shareMenu.style.display = 'none';
                    sharedWithBtn.style.display = 'none';
                    sharedWithPanel.style.display = 'none';
                }

                document.getElementById('noteTitle').textContent = note.title || 'Untitled Note';
                document.getElementById('noteMeta').textContent = `${visibility} - Created: ${createdAt}`;
                document.getElementById('noteContent').innerHTML = noteContent;
            } catch (error) {
                console.error('View note error:', error);
                alert('Could not open this note: ' + (error.message || error));
                window.location.href = 'library.html';
            }
        }

        loadNote();
    </script>
</body>
</html>
