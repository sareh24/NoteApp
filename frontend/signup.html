<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="signup">
   <form class="signform" id="signupForm">
      <div class="mb-3">
         <label for="firstName" class="form-label">First name</label>
         <input type="text" class="form-control" id="firstName" name="firstName" required>
      </div>
      <div class="mb-3">
         <label for="lastName" class="form-label">Last name</label>
         <input type="text" class="form-control" id="lastName" name="lastName" required>
      </div>
      <div class="mb-3">
         <label for="email" class="form-label">Email address</label>
         <input type="email" class="form-control" id="email" name="email" required>
      </div>
      <div class="mb-3">
         <label for="password" class="form-label">Password</label>
         <input type="password" class="form-control" id="password" name="password" required>
      </div>
      <div class="mb-3">
         <label for="confirmPassword" class="form-label">Repeat Password</label>
         <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
      </div>
      <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="agreeTerms" required>
          <label class="form-check-label" for="agreeTerms">I agree to the terms</label>
      </div>
      <button type="submit" class="subbutton">Submit</button>
   </form>

   <script>
      const API_URL = 'http://localhost:8000'

      async function register(firstName, lastName, email, password) {
         const response = await fetch(`${API_URL}/auth/register`, {
            method: 'POST',
            headers: {
               'Content-Type': 'application/json',
            },
            body: JSON.stringify({ firstName, lastName, email, password })
         });

         const data = await response.json();

         if (response.ok) {
            console.log('User registered:', data);
            return data;
         } else {
            throw new Error(data.detail || 'Registration failed');
         }
      }

      // Handle form submission
      document.querySelector('#signupForm').addEventListener('submit', async (e) => {
         e.preventDefault();

         const firstName = document.querySelector('#firstName').value;
         const lastName = document.querySelector('#lastName').value;
         const email = document.querySelector('#email').value;
         const password = document.querySelector('#password').value;
         const confirmPassword = document.querySelector('#confirmPassword').value;

         console.log('Form data:', { firstName, lastName, email, password });

         // Validate passwords match
         if (password !== confirmPassword) {
            alert('Passwords do not match');
            return;
         }

         try {
            const result = await register(firstName, lastName, email, password);
            console.log('Registration successful:', result);
            // Redirect after successful registration
            window.location.href = 'library.html';
         } catch (error) {
            console.error('Registration error:', error);
            alert('Registration failed: ' + error.message);
         }
      });
   </script>
</body>
</html>
